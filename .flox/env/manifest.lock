{
  "lockfile-version": 1,
  "manifest": {
    "version": 1,
    "install": {
      "boto3": {
        "pkg-path": "python311Packages.boto3"
      },
      "clickhouse": {
        "pkg-path": "clickhouse"
      },
      "docker": {
        "pkg-path": "docker"
      },
      "docker-compose": {
        "pkg-path": "docker-compose"
      },
      "duckdb": {
        "pkg-path": "python311Packages.duckdb"
      },
      "minio": {
        "pkg-path": "minio"
      },
      "pandas": {
        "pkg-path": "python311Packages.pandas"
      },
      "pip": {
        "pkg-path": "python311Packages.pip"
      },
      "polars": {
        "pkg-path": "python311Packages.polars"
      },
      "pyarrow": {
        "pkg-path": "python311Packages.pyarrow"
      },
      "pyiceberg": {
        "pkg-path": "python311Packages.pyiceberg",
        "systems": [
          "x86_64-linux"
        ]
      },
      "python": {
        "pkg-path": "python311Full"
      },
      "requests": {
        "pkg-path": "python311Packages.requests"
      },
      "s3fs": {
        "pkg-path": "python311Packages.s3fs"
      },
      "sqlalchemy": {
        "pkg-path": "python311Packages.sqlalchemy"
      },
      "uv": {
        "pkg-path": "uv"
      }
    },
    "vars": {
      "CLICKHOUSE_HOST": "127.0.0.1",
      "CLICKHOUSE_HTTP_PORT": "8123",
      "CLICKHOUSE_TCP_PORT": "9002",
      "ICEBERG_CATALOG_NAME": "local",
      "ICEBERG_WAREHOUSE": "s3://warehouse",
      "MINIO_CONSOLE_PORT": "9001",
      "MINIO_HOST": "127.0.0.1",
      "MINIO_PORT": "9000",
      "MINIO_ROOT_PASSWORD": "minioadmin",
      "MINIO_ROOT_USER": "minioadmin",
      "S3_ENDPOINT_URL": "http://127.0.0.1:9000",
      "S3_REGION": "us-east-1"
    },
    "hook": {
      "on-activate": "mkdir -p \"$FLOX_ENV_CACHE/logs\"\nmkdir -p \"$FLOX_ENV_CACHE/minio/data\"\nmkdir -p \"$FLOX_ENV_CACHE/clickhouse\"\nmkdir -p \"$FLOX_ENV_PROJECT/airbyte\"\n"
    },
    "profile": {
      "common": "de_airbyte_up() {\n  docker compose -f \"${AIRBYTE_COMPOSE_FILE:-$FLOX_ENV_PROJECT/airbyte/docker-compose.yaml}\" up -d\n}\n\nde_airbyte_down() {\n  docker compose -f \"${AIRBYTE_COMPOSE_FILE:-$FLOX_ENV_PROJECT/airbyte/docker-compose.yaml}\" down\n}\n\nde_clickhouse_query() {\n  clickhouse client --host \"$CLICKHOUSE_HOST\" --port \"$CLICKHOUSE_TCP_PORT\" --query \"$*\"\n}\n\nde_iceberg_env() {\n  printf 'S3 endpoint: %s\\nWarehouse: %s\\nCatalog: %s\\n' \"$S3_ENDPOINT_URL\" \"$ICEBERG_WAREHOUSE\" \"$ICEBERG_CATALOG_NAME\"\n}\n"
    },
    "options": {
      "systems": [
        "x86_64-linux",
        "aarch64-linux"
      ]
    },
    "services": {
      "airbyte": {
        "command": "set -euo pipefail\nairbyte_compose=\"${AIRBYTE_COMPOSE_FILE:-$FLOX_ENV_PROJECT/airbyte/docker-compose.yaml}\"\nif [ ! -f \"$airbyte_compose\" ]; then\n  echo \"Airbyte compose file not found: $airbyte_compose\" >&2\n  echo \"Create it at that path or override AIRBYTE_COMPOSE_FILE when activating.\" >&2\n  exit 1\nfi\nexec docker compose -f \"$airbyte_compose\" up\n",
        "is-daemon": true,
        "shutdown": {
          "command": "airbyte_compose=\"${AIRBYTE_COMPOSE_FILE:-$FLOX_ENV_PROJECT/airbyte/docker-compose.yaml}\"\nif [ -f \"$airbyte_compose\" ]; then\n  exec docker compose -f \"$airbyte_compose\" down\nfi\n"
        }
      },
      "clickhouse": {
        "command": "exec clickhouse server \\\n  --path \"$FLOX_ENV_CACHE/clickhouse\" \\\n  --listen_host \"$CLICKHOUSE_HOST\" \\\n  --http_port \"$CLICKHOUSE_HTTP_PORT\" \\\n  --tcp_port \"$CLICKHOUSE_TCP_PORT\"\n",
        "is-daemon": true
      },
      "minio": {
        "command": "export MINIO_ROOT_USER\nexport MINIO_ROOT_PASSWORD\nexec minio server \"$FLOX_ENV_CACHE/minio/data\" \\\n  --address \"$MINIO_HOST:$MINIO_PORT\" \\\n  --console-address \"$MINIO_HOST:$MINIO_CONSOLE_PORT\"\n",
        "is-daemon": true
      }
    },
    "build": {
      "import-check": {
        "command": "mkdir -p \"$out\"\npython - << 'PY'\nimport importlib\n\nmodules = [\n    \"pandas\",\n    \"polars\",\n    \"pyarrow\",\n    \"duckdb\",\n    \"sqlalchemy\",\n    \"boto3\",\n    \"s3fs\",\n    \"pyiceberg\",\n]\nmissing = [m for m in modules if importlib.util.find_spec(m) is None]\nif missing:\n    raise SystemExit(f\"Missing imports: {', '.join(missing)}\")\n\nprint(\"Data engineering Python imports are available\")\nPY\n"
      }
    }
  },
