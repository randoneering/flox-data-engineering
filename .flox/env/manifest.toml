schema-version = "1.10.0"
[install]
# Base Python toolchain
python.pkg-path = "python311Full"
python.outputs = "all"
uv.pkg-path = "uv"
uv.outputs = "all"
pip.pkg-path = "python311Packages.pip"
pip.outputs = "all"

# Common Python libraries for data engineering
pandas.pkg-path = "python311Packages.pandas"
pandas.outputs = "all"
polars.pkg-path = "python311Packages.polars"
polars.outputs = "all"
pyarrow.pkg-path = "python311Packages.pyarrow"
pyarrow.outputs = "all"
duckdb.pkg-path = "python311Packages.duckdb"
duckdb.outputs = "all"
sqlalchemy.pkg-path = "python311Packages.sqlalchemy"
sqlalchemy.outputs = "all"
requests.pkg-path = "python311Packages.requests"
requests.outputs = "all"
boto3.pkg-path = "python311Packages.boto3"
boto3.outputs = "all"
s3fs.pkg-path = "python311Packages.s3fs"
s3fs.outputs = "all"
pyiceberg.pkg-path = "python311Packages.pyiceberg"
pyiceberg.systems = ["x86_64-linux"]
pyiceberg.outputs = "all"

# Local service and workflow tooling
docker.pkg-path = "docker"
docker-compose.pkg-path = "docker-compose"
minio.pkg-path = "minio"
clickhouse.pkg-path = "clickhouse"
flox-mcp-server.pkg-path = "flox/flox-mcp-server"
flox-mcp-server.pkg-group = "flox-mcp-server"

[vars]
# S3-compatible object storage (MinIO)
MINIO_HOST = "127.0.0.1"
MINIO_PORT = "9000"
MINIO_CONSOLE_PORT = "9001"
MINIO_ROOT_USER = "minioadmin"
MINIO_ROOT_PASSWORD = "minioadmin"
S3_ENDPOINT_URL = "http://127.0.0.1:9000"
S3_REGION = "us-east-1"

# Iceberg catalog defaults
ICEBERG_CATALOG_NAME = "local"
ICEBERG_WAREHOUSE = "s3://warehouse"

# ClickHouse local analytics
CLICKHOUSE_HOST = "127.0.0.1"
CLICKHOUSE_HTTP_PORT = "8123"
CLICKHOUSE_TCP_PORT = "9002"

[hook]
on-activate = '''
mkdir -p "$FLOX_ENV_CACHE/logs"
mkdir -p "$FLOX_ENV_CACHE/minio/data"
mkdir -p "$FLOX_ENV_CACHE/clickhouse/data"
mkdir -p "$FLOX_ENV_CACHE/clickhouse/tmp"
mkdir -p "$FLOX_ENV_CACHE/clickhouse/user_files"
mkdir -p "$FLOX_ENV_CACHE/clickhouse/format_schemas"
mkdir -p "$FLOX_ENV_PROJECT/airbyte"
'''

[profile]
common = '''
de_airbyte_up() {
  docker compose -f "${AIRBYTE_COMPOSE_FILE:-$FLOX_ENV_PROJECT/airbyte/docker-compose.yaml}" up -d
}

de_airbyte_down() {
  docker compose -f "${AIRBYTE_COMPOSE_FILE:-$FLOX_ENV_PROJECT/airbyte/docker-compose.yaml}" down
}

de_clickhouse_query() {
  clickhouse client --host "$CLICKHOUSE_HOST" --port "$CLICKHOUSE_TCP_PORT" --query "$*"
}

de_iceberg_env() {
  printf 'S3 endpoint: %s\nWarehouse: %s\nCatalog: %s\n' "$S3_ENDPOINT_URL" "$ICEBERG_WAREHOUSE" "$ICEBERG_CATALOG_NAME"
}
'''

[services.minio]
command = '''
export MINIO_ROOT_USER
export MINIO_ROOT_PASSWORD
exec minio server "$FLOX_ENV_CACHE/minio/data" \
  --address "$MINIO_HOST:$MINIO_PORT" \
  --console-address "$MINIO_HOST:$MINIO_CONSOLE_PORT"
'''
is-daemon = true

[services.minio.shutdown]
command = '''
python - <<'PY'
import os
import signal

needle = f"minio\0server\0{os.environ['FLOX_ENV_CACHE']}/minio/data"

for pid in os.listdir('/proc'):
    if not pid.isdigit():
        continue
    try:
        with open(f'/proc/{pid}/cmdline', 'rb') as fh:
            cmdline = fh.read().decode(errors='ignore')
    except OSError:
        continue
    if needle in cmdline:
        os.kill(int(pid), signal.SIGTERM)
PY
'''

[services.clickhouse]
command = '''
clickhouse_host="${CLICKHOUSE_HOST:-127.0.0.1}"
clickhouse_http_port="${CLICKHOUSE_HTTP_PORT:-8123}"
clickhouse_tcp_port="${CLICKHOUSE_TCP_PORT:-9002}"

cat > "$FLOX_ENV_CACHE/clickhouse/config.xml" <<EOF
<clickhouse>
  <logger>
    <level>warning</level>
    <console>1</console>
    <log>$FLOX_ENV_CACHE/logs/clickhouse.log</log>
    <errorlog>$FLOX_ENV_CACHE/logs/clickhouse.err.log</errorlog>
    <size>1000M</size>
    <count>3</count>
  </logger>
  <http_port>$clickhouse_http_port</http_port>
  <tcp_port>$clickhouse_tcp_port</tcp_port>
  <listen_host>$clickhouse_host</listen_host>
  <path>$FLOX_ENV_CACHE/clickhouse/data/</path>
  <tmp_path>$FLOX_ENV_CACHE/clickhouse/tmp/</tmp_path>
  <user_files_path>$FLOX_ENV_CACHE/clickhouse/user_files/</user_files_path>
  <format_schema_path>$FLOX_ENV_CACHE/clickhouse/format_schemas/</format_schema_path>
  <users_config>$FLOX_ENV_CACHE/clickhouse/users.xml</users_config>
</clickhouse>
EOF

cat > "$FLOX_ENV_CACHE/clickhouse/users.xml" <<EOF
<clickhouse>
  <profiles>
    <default />
  </profiles>
  <users>
    <default>
      <password></password>
      <networks>
        <ip>::/0</ip>
      </networks>
      <profile>default</profile>
      <quota>default</quota>
      <access_management>1</access_management>
      <named_collection_control>1</named_collection_control>
    </default>
  </users>
  <quotas>
    <default>
      <interval>
        <duration>3600</duration>
        <queries>0</queries>
        <errors>0</errors>
        <result_rows>0</result_rows>
        <read_rows>0</read_rows>
        <execution_time>0</execution_time>
      </interval>
    </default>
  </quotas>
</clickhouse>
EOF

exec clickhouse-server \
  --config-file "$FLOX_ENV_CACHE/clickhouse/config.xml" \
  --pidfile "$FLOX_ENV_CACHE/clickhouse/clickhouse.pid"
'''
is-daemon = true

[services.clickhouse.shutdown]
command = '''
pidfile="$FLOX_ENV_CACHE/clickhouse/clickhouse.pid"
if [ -f "$pidfile" ]; then
  kill "$(cat "$pidfile")" 2>/dev/null || true
fi
'''

[services.airbyte]
command = '''
set -euo pipefail
airbyte_compose="${AIRBYTE_COMPOSE_FILE:-$FLOX_ENV_PROJECT/airbyte/docker-compose.yaml}"
if [ ! -f "$airbyte_compose" ]; then
  echo "Airbyte compose file not found: $airbyte_compose" >&2
  echo "Create it at that path or override AIRBYTE_COMPOSE_FILE when activating." >&2
  exit 1
fi
exec docker compose -f "$airbyte_compose" up
'''
is-daemon = true

[services.airbyte.shutdown]
command = '''
airbyte_compose="${AIRBYTE_COMPOSE_FILE:-$FLOX_ENV_PROJECT/airbyte/docker-compose.yaml}"
if [ -f "$airbyte_compose" ]; then
  exec docker compose -f "$airbyte_compose" down
fi
'''

[build.import-check]
command = '''
mkdir -p "$out"
python - << 'PY'
import importlib

modules = [
    "pandas",
    "polars",
    "pyarrow",
    "duckdb",
    "sqlalchemy",
    "boto3",
    "s3fs",
    "pyiceberg",
]
missing = [m for m in modules if importlib.util.find_spec(m) is None]
if missing:
    raise SystemExit(f"Missing imports: {', '.join(missing)}")

print("Data engineering Python imports are available")
PY
'''

[options]
systems = ["x86_64-linux", "aarch64-linux"]
